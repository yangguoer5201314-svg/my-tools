<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谢晶晶的工具箱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;background:linear-gradient(135deg,#fefaf6,#fdf2f8,#f0fdfa);display:flex;justify-content:center;align-items:center;padding:24px}
.card{width:100%;max-width:400px;background:rgba(255,255,255,0.8);backdrop-filter:blur(20px);border-radius:24px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.08);text-align:center}
.owner{font-size:12px;font-weight:600;color:#c8985a;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
h1{font-size:24px;color:#2c2420;margin-bottom:32px}
.tool{display:flex;align-items:center;padding:18px;border:1px solid #e8e0da;border-radius:16px;margin-bottom:12px;text-decoration:none;color:inherit;transition:all .3s}
.tool:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.tool-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;margin-right:16px}
.tool-info{text-align:left;flex:1}
.tool-name{font-size:16px;font-weight:700;color:#2c2420;margin-bottom:3px}
.tool-desc{font-size:13px;color:#999}
.arrow{color:#ccc;font-size:20px}
</style>
</head>
<body>
<div class="card">
<div class="owner">谢晶晶</div>
<h1>📦 我的工具箱</h1>

<a class="tool" href="index.html">
<div class="tool-icon" style="background:linear-gradient(135deg,#f8c8d0,#d4556e);color:#fff">🌸</div>
<div class="tool-info"><div class="tool-name">MBTI 人格测试</div><div class="tool-desc">了解你的性格类型</div></div>
<div class="arrow">→</div>
</a>

<a class="tool" href="medication.html">
<div class="tool-icon" style="background:linear-gradient(135deg,#ccfbf1,#0d9488);color:#fff">💊</div>
<div class="tool-info"><div class="tool-name">服药提醒</div><div class="tool-desc">管理药品 · 准时提醒</div></div>
<div class="arrow">→</div>
</a>

<p style="margin-top:20px;font-size:12px;color:#ccc">添加到手机桌面，随时打开</p>
</div>
</body>
</html>
